name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # ۱. استخراج فایل پروژه شما (چه RAR باشه چه ZIP)
    - name: Extract Project File
      run: |
        if [ -f "Dastyar nlu ofline.rar" ]; then
          7z x "Dastyar nlu ofline.rar"
        elif [ -f "Dastya.zip" ]; then
          7z x "Dastya.zip"
        fi
        echo "=== Extraction Complete ==="
        ls -la

    # ۲. جابجایی هوشمند فایل‌ها در صورت تو در تو بودن پوشه‌ها
    - name: Move files to root
      run: |
        TARGET_DIR=$(find . -maxdepth 3 -name "settings.gradle*" -exec dirname {} \; | head -n 1)
        echo "Project root found at: $TARGET_DIR"
        if [ "$TARGET_DIR" != "." ] && [ -n "$TARGET_DIR" ]; then
          mv "$TARGET_DIR"/* . 2>/dev/null || true
          mv "$TARGET_DIR"/.* . 2>/dev/null || true
        fi

    # ۳. تنظیم دقیق نسخه گریدل روی 9.3.1
    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 9.3.1

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # ۴. حل مشکل KSP با تزریق تنظیمات اختصاصی به فایل تنظیمات
    - name: Fix KSP CI Issue
      run: |
        touch gradle.properties
        echo "" >> gradle.properties
        echo "ksp.incremental=false" >> gradle.properties
        echo "org.gradle.jvmargs=-Xmx4g -Djava.awt.headless=true" >> gradle.properties

    # ۵. کامپایل نهایی پروژه بدون دیمن (برای جلوگیری از خطای جاوای کاتلین)
    - name: Build with Gradle
      run: ./gradlew assembleDebug --no-daemon -Pksp.incremental=false

    # ۶. آپلود فایل نهایی برای دانلود شما
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: nora-assistant-apk
        path: app/build/outputs/apk/debug/*.apk
